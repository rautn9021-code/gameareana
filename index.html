<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exciting Things Are Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f1f5f9;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 650px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .coming-soon {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 40px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
        }

        .social-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
        }

        .social-link:hover {
            color: #ffffff;
            background: rgba(255,255,255,0.1);
        }

        .footer {
            font-size: 0.8rem;
            color: #475569;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 30px;
        }

        @media (max-width: 550px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .message {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            🚀✨
        </div>
        <div class="coming-soon">Coming Soon</div>
        <h1>Something Amazing Is<br>On The Horizon</h1>
        <div class="message">
            We're working hard behind the scenes to bring you an exciting new experience. 
            Stay tuned for updates — great things are just around the corner.
        </div>
        <div class="social-links">
            <a href="#" class="social-link">📧 Notify Me</a>
            <a href="#" class="social-link">🐦 Twitter</a>
            <a href="#" class="social-link">💬 Discord</a>
        </div>
        <div class="footer">
            &copy; 2025 — All systems initializing
        </div>
    </div>
</body>
</html>
